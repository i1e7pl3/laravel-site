services:
  app:
    build: .
    container_name: laravel-app
    working_dir: /var/www
    volumes:
      - ./:/var/www
    depends_on:
      - db
      - mailpit
    # DNS внутри контейнера: иначе часто падает "Could not resolve host: api.github.com" при composer install
    dns:
      - 8.8.8.8
      - 8.8.4.4
      - 1.1.1.1
    # Обход поломанного DNS в Docker/WSL: smtp.mail.ru → IP (при ошибке TLS/подключения проверьте актуальный IP:
    # curl -s "https://dns.google/resolve?name=smtp.mail.ru&type=A" | head -c 200)
    extra_hosts:
      - "smtp.mail.ru:217.69.139.160"
    ports:
      # если порт занят — поменяйте левое число (хост), например "8080:8000"
      - "8080:8000"

  db:
    image: mysql:8.0
    container_name: mysql-db
    dns:
      - 8.8.8.8
      - 8.8.4.4
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: laravel
      MYSQL_USER: laravel
      MYSQL_PASSWORD: secret
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
  mailpit:
    image: axllent/mailpit:latest
    container_name: mailpit
    ports:
      - "8025:8025"
      - "1025:1025"
volumes:
  db_data: