services:
  app:
    build: .
    container_name: laravel-app
    working_dir: /var/www
    volumes:
      - ./:/var/www
    depends_on:
      - db
    ports:
       - "8001:8000"

  db:
    image: mysql:8.0
    container_name: mysql-db
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: laravel
      MYSQL_USER: laravel
      MYSQL_PASSWORD: secret
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql

volumes:
  db_data: